<header class="main-header">
  <a href="/" class="logo-link" style="text-decoration: none; color: inherit;">
    <div class="logo"><span class="green">F</span>i<span class="green">L</span>o</div>
  </a>

  <div class="right-area" style="display: flex; align-items: center;">
    <div id="search-icon" title="검색" role="button" tabindex="0" aria-label="검색 아이콘" style="cursor: pointer;">
      <!-- 돋보기 아이콘 SVG -->
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="10"></circle>
        <line x1="24" y1="24" x2="18" y2="18"></line>
      </svg>
    </div>
    <div id="profile-area">
      <div class="profile-avatar"><span class="avatar-text">?</span></div>
    </div>

    <!-- 검색 영역 전체 래퍼, 기본 숨김은 CSS에서 -->
    <div class="header-search-wrapper">
      <button id="back-button" aria-label="뒤로가기 버튼">&larr;</button>
      <div style="display: flex; align-items: center; flex: 1; position: relative;">
        <input type="text" id="header-search-input" placeholder="장소명, 작품명, 주소로 검색" autocomplete="off" style="width: 100%; padding-right: 40px;" />
        <button id="search-execute-btn" aria-label="검색 실행" style="position: absolute; right: 8px; background: none; border: none; cursor: pointer; padding: 4px; display: flex; align-items: center;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="10"></circle>
            <line x1="24" y1="24" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
    </div>
  </div>
</header>
