<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FiLo — 등장인물 상세</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/comments.css" />
</head>
<body>
  <div id="header"></div>
  <div class="container" id="character-detail">
    <div class="character-hero">
      <img id="ch-image" class="character-photo" alt="" />
      <div class="character-summary">
        <h2 id="ch-name" class="character-name"></h2>
        <div class="character-meta">
          <div id="ch-nation-job" class="meta-line"></div>
          <div id="ch-birthdate" class="meta-line"></div>
          <div id="ch-age" class="meta-line"></div>
          <div id="ch-birthplace" class="meta-line"></div>
          <div id="ch-physique" class="meta-line"></div>
        </div>
      </div>
    </div>

    <div class="character-details">
      <div class="detail-row" id="row-education">
        <div class="detail-label">학력</div>
        <div id="edu-value" class="detail-value"></div>
      </div>

      <div class="detail-row" id="row-description">
        <div class="detail-label">설명</div>
        <div id="desc-value" class="detail-value"></div>
      </div>
    </div>
  </div>

  <div class="comments">
    <h3>댓글</h3>
    <div id="comment-list"></div>
    <form id="comment-form" style="display:none;">
      <textarea id="comment-input" placeholder="댓글을 남겨보세요..." required></textarea>
      <div class="comment-counter"><span id="comment-count">0</span>/<span id="comment-limit">1000</span></div>
      <button type="submit">등록</button>
    </form>
    <div id="login-prompt" style="display: none;">
      <p class="login-message">로그인 후 댓글을 남겨보세요...</p>
    </div>
  </div>

  <script type="module" src="js/render-comments.js"></script>
  <script type="module" src="js/character-detail.js"></script>
</body>
</html>
