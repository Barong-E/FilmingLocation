<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FiLo — 장소 상세</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/comments.css" />
</head>
<body>
  <div id="header"></div>
  <div class="container" id="detail">
    <!-- FiLo 로고 (클릭 시 places.html 이동) -->
    <!-- 이 부분은 공통 헤더로 대체되므로 삭제합니다. -->

    <!-- 장면 이미지 -->
    <img id="detail-img" class="scene-img" src="" alt="" />

    <!-- 장소명 -->
    <div class="detail-row">
      <div class="detail-label">장소명</div>
      <div class="detail-value" id="detail-name"></div>
    </div>

    <!-- 작품명들 (클릭 시 작품 상세페이지로 이동) -->
    <div class="detail-row">
      <div class="detail-label">작품명</div>
      <div class="detail-value" id="detail-works">
        <!-- 작품 목록이 여기에 동적으로 추가됩니다 -->
      </div>
    </div>

    <!-- 촬영지 주소 -->
    <div class="detail-row">
      <div class="detail-label">촬영지</div>
      <div class="detail-value">
        <a id="detail-address" class="address-link" href="" target="_blank" rel="noopener noreferrer">
          <!-- 텍스트는 JS에서 채워짐 -->
        </a>
      </div>
    </div>
  </div>

    <!-- 댓글 섹션 시작 -->
  <div class="comments">
    <h3>댓글</h3>
    <!-- 댓글 목록이 렌더링될 곳 -->
    <div id="comment-list"></div>
    <!-- 댓글 작성 폼 (로그인해야 보일 예정) → 목록 아래로 이동 -->
    <form id="comment-form" style="display: none;">
      <textarea
        id="comment-input"
        placeholder="댓글을 남겨보세요..."
        required
      ></textarea>
      <div class="comment-counter"><span id="comment-count">0</span>/<span id="comment-limit">1000</span></div>
      <button type="submit">등록</button>
    </form>
    <!-- 로그인 안내 메시지 -->
    <div id="login-prompt" style="display: none;">
      <p class="login-message">로그인 후 댓글을 남겨보세요...</p>
    </div>
  </div>
  <!-- 댓글 섹션 끝 -->

  <!-- 댓글 렌더링 스크립트 불러오기 -->
  <script type="module" src="js/render-comments.js"></script>

  <!-- detail.js (모듈 방식) -->
  <script type="module" src="js/detail.js"></script>

</body>
</html>
