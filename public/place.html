<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FiLo — 장소 상세</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="header"></div>
  <div class="container" id="detail">
    <!-- FiLo 로고 (클릭 시 index.html 이동) -->
    <!-- 이 부분은 공통 헤더로 대체되므로 삭제합니다. -->

    <!-- 장면 이미지 -->
    <img id="detail-img" class="scene-img" src="" alt="" />

    <!-- 장소명 -->
    <div class="info">
      <span class="label">장소명:</span>
      <span class="value" id="detail-name"></span>
    </div>

    <!-- 작품명 (토글 가능) -->
    <div class="info">
      <div class="work-toggle" id="toggle-work">
        <span class="label">작품명:</span>
        <span class="value" id="detail-work"></span>
        <svg class="arrow" id="toggle-icon" width="12" height="12" viewBox="0 0 24 24">
          <polyline points="6 9 12 15 18 9"
                    fill="none" stroke="#333" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="sub-info" id="work-sub-info">
        <div><span class="label">종류:</span><span class="value" id="detail-type"></span></div>
        <div><span class="label">공개일:</span><span class="value" id="detail-release"></span></div>
        <div><span class="label">소개:</span><span class="value value-line-break" id="detail-description"></span></div>
        <div><span class="label">등장인물:</span><span class="value value-line-break" id="detail-characters"></span></div>
      </div>
    </div>

    <!-- 촬영지 주소 -->
    <div class="info">
      <span class="label">촬영지:</span>
      <a id="detail-address" class="value address-link" href="" target="_blank" rel="noopener noreferrer">
        <!-- 텍스트는 JS에서 채워짐 -->
      </a>
    </div>
  </div>

    <!-- 댓글 섹션 시작 -->
  <div class="comments">
    <h3>댓글</h3>
    <!-- 댓글 목록이 렌더링될 곳 -->
    <div id="comment-list" style="padding: 0 12px;"></div>
    <!-- 댓글 작성 폼 (로그인해야 보일 예정) → 목록 아래로 이동 -->
    <form id="comment-form" style="display: none; padding: 0 12px;">
      <textarea
        id="comment-input"
        placeholder="댓글을 남겨보세요..."
        required
      ></textarea>
      <div class="comment-counter"><span id="comment-count">0</span>/<span id="comment-limit">1000</span></div>
      <button type="submit">등록</button>
    </form>
    <!-- 로그인 안내 메시지 -->
    <div id="login-prompt" style="padding: 0 12px; display: none;">
      <p class="login-message">로그인 후 댓글을 남겨보세요...</p>
    </div>
  </div>
  <!-- 댓글 섹션 끝 -->

  <!-- 댓글 렌더링 스크립트 불러오기 -->
  <script type="module" src="js/render-comments.js"></script>

  <!-- detail.js (모듈 방식) -->
  <script type="module" src="js/detail.js"></script>

  <!-- 작품 정보 토글 스크립트 유지 -->
  <script defer>
    document.addEventListener('DOMContentLoaded', () => {
      const toggle = document.getElementById('toggle-work');
      const sub = document.getElementById('work-sub-info');
      const icon = document.getElementById('toggle-icon');
      toggle.addEventListener('click', () => {
        const open = sub.classList.toggle('open');
        icon.classList.toggle('open', open);
      });
    });
  </script>
</body>
</html>
