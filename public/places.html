<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FiLo - 촬영지 리스트</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/gnb.css" />
</head>

<body>
  <div id="header"></div>

  <div class="container container--wide">
    <!--
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="장소명, 작품명, 주소로 검색" autocomplete="off" />
      <ul id="suggestion-list"></ul>
    </div>
    -->


    <div id="place-list"></div>
  </div>

  <script type="module">
    import { loadHeader, setupHeaderSearch } from './js/header-loader.js';
    import { renderProfileArea } from './js/render-places.js';
    import { checkAuth } from './js/utils.js';

    loadHeader().then(() => {
      setupHeaderSearch(); // 헤더 로드 후 검색 기능 초기화 (데이터 로딩 포함)
      renderProfileArea();
      checkAuth();
    });
    
    // GNB 로드
    import { loadGNB } from './js/gnb-loader.js';
    loadGNB();
  </script>
</body>

</html>
