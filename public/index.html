<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FiLo - Filming Location</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/home.css">
  <link rel="stylesheet" href="/css/gnb.css">
</head>
<body>
  <!-- 헤더 컨테이너 -->
  <div id="header"></div>
  
  <!-- 메인 콘텐츠 영역 -->
  <main class="home-main">
    <section class="home-hero" aria-label="홈 소개">
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <h1 class="home-title">당신이 사랑한 그 장면, 그곳으로 떠나보세요</h1>
        <p class="home-subtitle">원하는 분위기, 작품명, 인물 이름만 입력하면 관련 촬영지를 빠르게 찾아드립니다.</p>

        <form id="home-search-form" class="home-search-form" autocomplete="off">
          <label for="home-search-input" class="sr-only">검색어</label>
          <div class="search-input-wrapper" id="home-search-trigger" style="cursor: pointer;">
            <span class="search-icon" style="pointer-events: none;">🔍</span>
            <input
              id="home-search-input"
              type="text"
              placeholder="예: 서울 / 카페 / 학교 / 작품명 / 인물명"
              aria-label="홈 검색 입력"
              readonly
              style="cursor: pointer; pointer-events: none;"
            />
            <button type="button" aria-label="검색 실행" style="pointer-events: none;">검색</button>
          </div>
        </form>

        <div class="home-keywords" aria-label="추천 키워드">
          <span class="keywords-label">인기 검색어:</span>
          <div class="keywords-row">
            <button type="button" class="keyword-chip" data-keyword="서울">#서울</button>
            <button type="button" class="keyword-chip" data-keyword="카페">#카페</button>
            <button type="button" class="keyword-chip" data-keyword="학교">#학교</button>
            <button type="button" class="keyword-chip" data-keyword="바다">#바다</button>
            <button type="button" class="keyword-chip" data-keyword="야경">#야경</button>
            <button type="button" class="keyword-chip" data-keyword="한옥">#한옥</button>
            <button type="button" class="keyword-chip" data-keyword="드라마">#드라마</button>
            <button type="button" class="keyword-chip" data-keyword="액션">#액션</button>
          </div>
        </div>
      </div>
    </section>

    <div class="home-content">
      <h2 class="section-title">무엇을 찾고 계신가요?</h2>
      <section class="home-quick-links" aria-label="빠른 바로가기">
        <a class="quick-card" href="/places" aria-label="장소 보러가기">
          <div class="quick-card-icon">📍</div>
          <div>
            <div class="quick-card-title">장소 보러가기</div>
            <div class="quick-card-desc">아름다운 촬영지 리스트</div>
          </div>
        </a>
        <a class="quick-card" href="/works" aria-label="작품 보러가기">
          <div class="quick-card-icon">🎬</div>
          <div>
            <div class="quick-card-title">작품 보러가기</div>
            <div class="quick-card-desc">영화, 드라마, 에피소드</div>
          </div>
        </a>
        <a class="quick-card" href="/characters" aria-label="인물 보러가기">
          <div class="quick-card-icon">👤</div>
          <div>
            <div class="quick-card-title">인물 보러가기</div>
            <div class="quick-card-desc">작품 속 등장인물 검색</div>
          </div>
        </a>
      </section>
    </div>
  </main>
  
  <!-- GNB는 JavaScript로 body 끝에 추가됨 -->
  
  <!-- JavaScript 모듈 -->
  <script type="module" src="/js/home.js"></script>
</body>
</html>
