<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FiLo - Filming Location</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/home.css">
  <link rel="stylesheet" href="/css/gnb.css">
</head>
<body>
  <!-- 헤더 컨테이너 -->
  <div id="header"></div>
  
  <!-- 메인 콘텐츠 영역 -->
  <main class="home-main">
    <div class="home-content">
      <section class="home-hero" aria-label="홈 소개">
        <h1 class="home-title">작품/인물/장소로 촬영지를 찾아보세요</h1>
        <p class="home-subtitle">원하는 분위기, 제목, 인물 이름만 입력하면 관련 촬영지를 빠르게 찾아드립니다.</p>

        <form id="home-search-form" class="home-search-form" autocomplete="off">
          <label for="home-search-input" class="sr-only">검색어</label>
          <input
            id="home-search-input"
            name="q"
            type="text"
            inputmode="search"
            placeholder="예: 서울 / 카페 / 학교 / 작품명 / 인물명"
            aria-label="홈 검색 입력"
          />
          <button id="home-search-btn" type="submit" aria-label="검색 실행">검색</button>
        </form>
      </section>

      <section class="home-quick-links" aria-label="빠른 바로가기">
        <a class="quick-card" href="/places" aria-label="장소 보러가기">
          <span class="quick-card-title">장소 보러가기</span>
          <span class="quick-card-desc">촬영지 리스트</span>
        </a>
        <a class="quick-card" href="/works" aria-label="작품 보러가기">
          <span class="quick-card-title">작품 보러가기</span>
          <span class="quick-card-desc">작품/에피소드</span>
        </a>
        <a class="quick-card" href="/characters" aria-label="인물 보러가기">
          <span class="quick-card-title">인물 보러가기</span>
          <span class="quick-card-desc">등장인물 검색</span>
        </a>
      </section>

      <section class="home-keywords" aria-label="추천 키워드">
        <div class="keywords-row">
          <button type="button" class="keyword-chip" data-keyword="서울">서울</button>
          <button type="button" class="keyword-chip" data-keyword="카페">카페</button>
          <button type="button" class="keyword-chip" data-keyword="학교">학교</button>
          <button type="button" class="keyword-chip" data-keyword="바다">바다</button>
          <button type="button" class="keyword-chip" data-keyword="야경">야경</button>
          <button type="button" class="keyword-chip" data-keyword="한옥">한옥</button>
          <button type="button" class="keyword-chip" data-keyword="드라마">드라마</button>
          <button type="button" class="keyword-chip" data-keyword="액션">액션</button>
        </div>
      </section>
    </div>
  </main>
  
  <!-- GNB는 JavaScript로 body 끝에 추가됨 -->
  
  <!-- JavaScript 모듈 -->
  <script type="module" src="/js/home.js"></script>
</body>
</html>
