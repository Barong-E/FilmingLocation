<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FiLo - 촬영지 리스트</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div id="header"></div>

  <div class="container">
    <!--
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="장소명, 작품명, 주소로 검색" autocomplete="off" />
      <ul id="suggestion-list"></ul>
    </div>
    -->


    <div id="place-list"></div>
  </div>

  <script type="module">
    import { loadHeader, setupHeaderSearch } from './js/header-loader.js';
    import { renderPlaces, renderProfileArea, checkAuth } from './js/render-places.js';
    import './js/search.js'; // search.js 다시 import

    loadHeader().then(() => {
      setupHeaderSearch(); // ← 검색창 이벤트 셋업 추가
      renderProfileArea();
      checkAuth();
    });

    fetch('./data/places.json')
      .then(res => res.json())
      .then(places => {
        renderPlaces(places);
      });
  </script>
</body>

</html>
