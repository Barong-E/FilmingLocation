<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FiLo 검색 통계 대시보드</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/dashboard.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div id="dashboard-container">
    <!-- 헤더 -->
    <header class="dashboard-header">
      <div class="header-content">
        <h1>📊 FiLo 검색 통계 대시보드</h1>
        <div class="header-actions">
          <button id="refresh-btn" class="btn btn-primary">🔄 새로고침</button>
          <button id="export-btn" class="btn btn-secondary">📥 내보내기</button>
          <a href="/" class="btn btn-outline">🏠 홈으로</a>
        </div>
      </div>
    </header>

    <!-- 주요 지표 카드 -->
    <section class="metrics-section">
      <div class="metrics-grid">
        <div class="metric-card">
          <div class="metric-icon">🔍</div>
          <div class="metric-content">
            <h3>총 검색 요청</h3>
            <div class="metric-value" id="total-requests">-</div>
            <div class="metric-change" id="requests-change">-</div>
          </div>
        </div>
        
        <div class="metric-card">
          <div class="metric-icon">⚡</div>
          <div class="metric-content">
            <h3>캐시 히트율</h3>
            <div class="metric-value" id="cache-hit-rate">-</div>
            <div class="metric-change" id="cache-change">-</div>
          </div>
        </div>
        
        <div class="metric-card">
          <div class="metric-icon">⏱️</div>
          <div class="metric-content">
            <h3>평균 응답시간</h3>
            <div class="metric-value" id="avg-response-time">-</div>
            <div class="metric-change" id="response-change">-</div>
          </div>
        </div>
        
        <div class="metric-card">
          <div class="metric-icon">❌</div>
          <div class="metric-content">
            <h3>오류율</h3>
            <div class="metric-value" id="error-rate">-</div>
            <div class="metric-change" id="error-change">-</div>
          </div>
        </div>
      </div>
    </section>

    <!-- 차트 섹션 -->
    <section class="charts-section">
      <div class="charts-grid">
        <!-- 시간별 검색 요청 -->
        <div class="chart-card">
          <div class="chart-header">
            <h3>📈 시간별 검색 요청</h3>
            <select id="time-range-select">
              <option value="24h">최근 24시간</option>
              <option value="7d">최근 7일</option>
              <option value="30d">최근 30일</option>
            </select>
          </div>
          <div class="chart-container">
            <canvas id="requests-chart"></canvas>
          </div>
        </div>

        <!-- 검색 타입별 분포 */
        <div class="chart-card">
          <div class="chart-header">
            <h3>🎯 검색 타입별 분포</h3>
          </div>
          <div class="chart-container">
            <canvas id="types-chart"></canvas>
          </div>
        </div>

        <!-- 인기 검색어 -->
        <div class="chart-card">
          <div class="chart-header">
            <h3>🔥 인기 검색어 TOP 10</h3>
          </div>
          <div class="chart-container">
            <canvas id="popular-queries-chart"></canvas>
          </div>
        </div>

        <!-- 응답시간 분포 -->
        <div class="chart-card">
          <div class="chart-header">
            <h3>⚡ 응답시간 분포</h3>
          </div>
          <div class="chart-container">
            <canvas id="response-time-chart"></canvas>
          </div>
        </div>
      </div>
    </section>

    <!-- 상세 테이블 섹션 -->
    <section class="tables-section">
      <div class="tables-grid">
        <!-- 느린 쿼리 -->
        <div class="table-card">
          <div class="table-header">
            <h3>🐌 느린 쿼리 (상위 10개)</h3>
            <button id="clear-slow-queries" class="btn btn-sm">지우기</button>
          </div>
          <div class="table-container">
            <table id="slow-queries-table">
              <thead>
                <tr>
                  <th>검색어</th>
                  <th>타입</th>
                  <th>응답시간</th>
                  <th>시간</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>

        <!-- 최근 오류 -->
        <div class="table-card">
          <div class="table-header">
            <h3>⚠️ 최근 오류 (상위 10개)</h3>
            <button id="clear-errors" class="btn btn-sm">지우기</button>
          </div>
          <div class="table-container">
            <table id="errors-table">
              <thead>
                <tr>
                  <th>오류 메시지</th>
                  <th>엔드포인트</th>
                  <th>시간</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>
    </section>

    <!-- 시스템 상태 -->
    <section class="status-section">
      <div class="status-grid">
        <div class="status-card">
          <h3>🖥️ 시스템 상태</h3>
          <div class="status-content">
            <div class="status-item">
              <span class="status-label">서버 가동시간:</span>
              <span id="server-uptime">-</span>
            </div>
            <div class="status-item">
              <span class="status-label">메모리 사용량:</span>
              <span id="memory-usage">-</span>
            </div>
            <div class="status-item">
              <span class="status-label">Redis 연결:</span>
              <span id="redis-status">-</span>
            </div>
            <div class="status-item">
              <span class="status-label">캐시 크기:</span>
              <span id="cache-size">-</span>
            </div>
          </div>
        </div>

        <div class="status-card">
          <h3>📋 캐시 통계</h3>
          <div class="status-content">
            <div class="status-item">
              <span class="status-label">Redis 히트:</span>
              <span id="redis-hits">-</span>
            </div>
            <div class="status-item">
              <span class="status-label">메모리 히트:</span>
              <span id="memory-hits">-</span>
            </div>
            <div class="status-item">
              <span class="status-label">총 미스:</span>
              <span id="total-misses">-</span>
            </div>
            <div class="status-item">
              <span class="status-label">오류 수:</span>
              <span id="cache-errors">-</span>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script type="module" src="/js/dashboard.js"></script>
</body>
</html>
