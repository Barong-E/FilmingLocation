<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FiLo — 작품 상세</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/comments.css" />
  <link rel="stylesheet" href="css/work-detail.css" />
</head>
<body>
  <div id="header"></div>
  <div class="container" id="work-detail">
    <!-- 포스터와 기본 정보를 좌우로 배치 -->
    <div class="work-header" style="display: flex; gap: 24px; margin-bottom: 32px; align-items: flex-start;">
      <div class="work-poster-section" style="flex-shrink: 0;">
        <img id="work-poster" class="work-poster-image" src="" alt="작품 포스터" style="width: 200px; height: 300px; object-fit: cover; border-radius: 12px; box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);" />
      </div>
      
      <div class="work-basic-info" style="flex: 1; min-width: 0;">
        <h2 id="work-title" style="margin-top: 0; margin-bottom: 20px; font-size: 28px; font-weight: 600; color: #333; line-height: 1.3;"></h2>
        <div class="detail-row">
          <div class="detail-label">종류</div>
          <div class="detail-value" id="work-type"></div>
        </div>
        <div class="detail-row">
          <div class="detail-label">공개일</div>
          <div class="detail-value" id="work-release"></div>
        </div>
      </div>
    </div>
    
    <!-- 나머지 상세 정보 -->
    <div class="work-detail-info" style="margin-top: 32px;">
      <div class="detail-row">
        <div class="detail-label">소개</div>
        <div class="detail-value" id="work-desc"></div>
      </div>
      <div class="detail-row">
        <div class="detail-label">등장인물</div>
        <div class="detail-value" id="work-chars"></div>
      </div>
      <div class="detail-row">
        <div class="detail-label">촬영지</div>
        <div class="detail-value" id="work-places"></div>
      </div>
    </div>
  </div>

  <div class="comments">
    <h3>댓글</h3>
    <div id="comment-list"></div>
    <form id="comment-form" style="display:none;">
      <textarea id="comment-input" placeholder="댓글을 남겨보세요..." required></textarea>
      <div class="comment-counter"><span id="comment-count">0</span>/<span id="comment-limit">1000</span></div>
      <button type="submit">등록</button>
    </form>
    <!-- 로그인 안내 메시지 -->
    <div id="login-prompt" style="display: none;">
      <p class="login-message">로그인 후 댓글을 남겨보세요...</p>
    </div>
  </div>

  <script type="module" src="js/render-comments.js"></script>
  <script type="module" src="js/work-detail.js"></script>
</body>
</html>
