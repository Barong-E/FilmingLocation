<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FiLo 사용자 관리</title>
  <link rel="stylesheet" href="/css/admin-dashboard.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
  <div class="dashboard">
    <!-- 공통 헤더 -->
    <div id="admin-header"></div>
    
    <main class="dashboard-main">
      <div class="page-header">
        <h2><i class="fas fa-users"></i> 사용자 관리</h2>
        <div class="page-actions">
          <button id="usersExportBtn" class="btn-secondary">
            <i class="fas fa-download"></i> CSV 내보내기
          </button>
        </div>
      </div>

      <!-- 검색 및 필터 -->
      <div class="search-section">
        <div class="search-box">
          <input type="text" id="userSearch" placeholder="사용자명, 이메일로 검색...">
          <button id="userSearchBtn" class="btn-primary">
            <i class="fas fa-search"></i> 검색
          </button>
        </div>
      </div>

      <!-- 사용자 테이블 -->
      <div class="table-section">
        <table class="data-table">
          <thead>
            <tr>
              <th>이름</th>
              <th>이메일</th>
              <th>상태</th>
              <th>가입일</th>
              <th>작업</th>
            </tr>
          </thead>
          <tbody id="usersTableBody">
            <!-- 사용자 목록 -->
          </tbody>
        </table>
        
        <!-- 페이지네이션 -->
        <div class="pagination" id="usersPagination">
          <!-- 페이지 번호들 -->
        </div>
      </div>
    </main>
  </div>

  <!-- 공통 푸터 -->
  <div id="admin-footer"></div>

  <script>
    // 헤더와 푸터 로드
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const headerResponse = await fetch('/partials/admin-header.html');
        const headerHtml = await headerResponse.text();
        document.getElementById('admin-header').innerHTML = headerHtml;
        
        const footerResponse = await fetch('/partials/admin-footer.html');
        const footerHtml = await footerResponse.text();
        document.getElementById('admin-footer').innerHTML = footerHtml;
      } catch (error) {
        console.error('헤더/푸터 로드 오류:', error);
      }
    });
  </script>
  <script src="/js/admin-common.js"></script>
  <script src="/js/admin-users.js"></script>
</body>
</html>
